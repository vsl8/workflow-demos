name: 🧪 Input Types Demo

on:
  workflow_dispatch:
    inputs:

      # ── TEXT BOX ──────────────────────────────────────────────
      app_name:
        description: "📝 Application Name (text box)"
        required: true
        type: string
        default: "my-awesome-app"

      version_tag:
        description: "🏷️  Version Tag (text, no default)"
        required: false
        type: string

      # ── NUMBER ────────────────────────────────────────────────
      replica_count:
        description: "🔢 Replica Count (number)"
        required: true
        type: number
        default: 2

      # ── BOOLEAN (checkbox) ────────────────────────────────────
      enable_debug:
        description: "🐛 Enable Debug Mode (boolean / checkbox)"
        required: false
        type: boolean
        default: false

      run_tests:
        description: "✅ Run Tests (boolean / checkbox)"
        required: true
        type: boolean
        default: true

      # ── CHOICE (dropdown) ─────────────────────────────────────
      environment:
        description: "🌍 Target Environment (dropdown)"
        required: true
        type: choice
        default: "staging"
        options:
          - development
          - staging
          - production

      log_level:
        description: "📋 Log Level (dropdown)"
        required: true
        type: choice
        default: "INFO"
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR
          - CRITICAL

      cloud_provider:
        description: "☁️  Cloud Provider (dropdown)"
        required: true
        type: choice
        default: "aws"
        options:
          - aws
          - azure
          - gcp
          - on-premise

      # ── ENVIRONMENT (special type) ────────────────────────────
      deploy_env:
        description: "🚀 Deploy Environment (environment type)"
        required: false
        type: environment

# ─────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════════
  # STAGE 1 — Validate & Echo All Inputs
  # ══════════════════════════════════════════════════════════════
  stage-1-validate-inputs:
    name: "📋 Stage 1 · Validate & Echo Inputs"
    runs-on: ubuntu-latest
    outputs:
      app_name:      ${{ github.event.inputs.app_name }}
      environment:   ${{ github.event.inputs.environment }}
      run_tests:     ${{ github.event.inputs.run_tests }}
      replica_count: ${{ github.event.inputs.replica_count }}

    steps:
      - name: "🖨️  Print All Raw Inputs"
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║         ALL WORKFLOW INPUTS RECEIVED         ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "  TEXT INPUTS"
          echo "  ─────────────────────────────────────────────"
          echo "  📝 app_name      : ${{ github.event.inputs.app_name }}"
          echo "  🏷️  version_tag   : ${{ github.event.inputs.version_tag || '(not provided)' }}"
          echo ""
          echo "  NUMBER INPUTS"
          echo "  ─────────────────────────────────────────────"
          echo "  🔢 replica_count : ${{ github.event.inputs.replica_count }}"
          echo ""
          echo "  BOOLEAN INPUTS"
          echo "  ─────────────────────────────────────────────"
          echo "  🐛 enable_debug  : ${{ github.event.inputs.enable_debug }}"
          echo "  ✅ run_tests     : ${{ github.event.inputs.run_tests }}"
          echo ""
          echo "  CHOICE / DROPDOWN INPUTS"
          echo "  ─────────────────────────────────────────────"
          echo "  🌍 environment   : ${{ github.event.inputs.environment }}"
          echo "  📋 log_level     : ${{ github.event.inputs.log_level }}"
          echo "  ☁️  cloud_provider: ${{ github.event.inputs.cloud_provider }}"
          echo ""
          echo "  ENVIRONMENT TYPE"
          echo "  ─────────────────────────────────────────────"
          echo "  🚀 deploy_env    : ${{ github.event.inputs.deploy_env || '(not selected)' }}"

      - name: "✅ Validate Required Text Input"
        run: |
          APP="${{ github.event.inputs.app_name }}"
          if [[ -z "$APP" ]]; then
            echo "❌ ERROR: app_name cannot be empty!"
            exit 1
          fi
          echo "✅ app_name is valid: $APP"

      - name: "🔢 Validate Number Input"
        run: |
          COUNT=${{ github.event.inputs.replica_count }}
          if (( COUNT < 1 || COUNT > 10 )); then
            echo "❌ ERROR: replica_count must be between 1 and 10, got $COUNT"
            exit 1
          fi
          echo "✅ replica_count is valid: $COUNT"

      - name: "📦 Set Version Tag (fallback logic)"
        run: |
          TAG="${{ github.event.inputs.version_tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="v$(date +%Y%m%d%H%M%S)"
            echo "ℹ️  version_tag not provided — auto-generated: $TAG"
          else
            echo "✅ version_tag provided: $TAG"
          fi
          echo "RESOLVED_TAG=$TAG" >> $GITHUB_ENV


  # ══════════════════════════════════════════════════════════════
  # STAGE 2 — Conditional Logic Based on Boolean Inputs
  # ══════════════════════════════════════════════════════════════
  stage-2-conditional-steps:
    name: "🔀 Stage 2 · Conditional Steps (Booleans)"
    runs-on: ubuntu-latest
    needs: stage-1-validate-inputs

    steps:
      - name: "🐛 Debug Mode — runs only if enable_debug = true"
        if: ${{ github.event.inputs.enable_debug == 'true' }}
        run: |
          echo "╔══════════════════════════════════╗"
          echo "║  DEBUG MODE IS ENABLED  🐛        ║"
          echo "╚══════════════════════════════════╝"
          echo "  env vars, secrets names, runner info:"
          echo "  Runner OS   : ${{ runner.os }}"
          echo "  Runner Arch : ${{ runner.arch }}"
          echo "  Workflow    : ${{ github.workflow }}"
          echo "  Run ID      : ${{ github.run_id }}"

      - name: "🔇 Debug Mode — skipped (enable_debug = false)"
        if: ${{ github.event.inputs.enable_debug == 'false' }}
        run: echo "ℹ️  Debug mode is OFF. Set enable_debug=true to see debug info."

      - name: "✅ Run Tests — runs only if run_tests = true"
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: |
          echo "🧪 Running test suite..."
          echo "  app: ${{ github.event.inputs.app_name }}"
          echo "  (Simulated) All 42 tests passed ✅"

      - name: "⏭️  Tests Skipped"
        if: ${{ github.event.inputs.run_tests == 'false' }}
        run: echo "⏭️  Tests skipped by user input."


  # ══════════════════════════════════════════════════════════════
  # STAGE 3 — Branch on Dropdown (choice) Input
  # ══════════════════════════════════════════════════════════════
  stage-3-environment-branch:
    name: "🌍 Stage 3 · Environment Branching (Dropdown)"
    runs-on: ubuntu-latest
    needs: stage-2-conditional-steps

    steps:
      - name: "🛠️  Dev Environment Config"
        if: ${{ github.event.inputs.environment == 'development' }}
        run: |
          echo "⚙️  Applying DEVELOPMENT configuration"
          echo "  → Verbose logging ON"
          echo "  → Hot-reload ON"
          echo "  → Mock services ON"
          echo "  → Replicas: ${{ github.event.inputs.replica_count }} (override to 1 in dev)"

      - name: "🧪 Staging Environment Config"
        if: ${{ github.event.inputs.environment == 'staging' }}
        run: |
          echo "⚙️  Applying STAGING configuration"
          echo "  → Integration tests will run"
          echo "  → Replicas: ${{ github.event.inputs.replica_count }}"
          echo "  → Cloud: ${{ github.event.inputs.cloud_provider }}"

      - name: "🚀 Production Environment Config"
        if: ${{ github.event.inputs.environment == 'production' }}
        run: |
          echo "⚙️  Applying PRODUCTION configuration 🚨"
          echo "  → Canary deployment strategy"
          echo "  → Replicas: ${{ github.event.inputs.replica_count }}"
          echo "  → Cloud: ${{ github.event.inputs.cloud_provider }}"
          echo "  → Log level: ${{ github.event.inputs.log_level }}"

      - name: "📋 Set Log Level"
        run: |
          echo "Configuring log level: ${{ github.event.inputs.log_level }}"
          case "${{ github.event.inputs.log_level }}" in
            DEBUG)   echo "  Verbose output enabled" ;;
            INFO)    echo "  Standard output" ;;
            WARNING) echo "  Warnings and above only" ;;
            ERROR)   echo "  Errors only" ;;
            CRITICAL)echo "  Critical failures only" ;;
          esac


  # ══════════════════════════════════════════════════════════════
  # STAGE 4 — Build Artefact Using All Inputs
  # ══════════════════════════════════════════════════════════════
  stage-4-build:
    name: "🏗️  Stage 4 · Build"
    runs-on: ubuntu-latest
    needs: stage-3-environment-branch

    steps:
      - name: "🏗️  Simulate Build"
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║              BUILDING APPLICATION            ║"
          echo "╚══════════════════════════════════════════════╝"
          echo "  App          : ${{ github.event.inputs.app_name }}"
          echo "  Environment  : ${{ github.event.inputs.environment }}"
          echo "  Cloud        : ${{ github.event.inputs.cloud_provider }}"
          echo "  Replicas     : ${{ github.event.inputs.replica_count }}"
          echo "  Log Level    : ${{ github.event.inputs.log_level }}"
          echo "  Debug        : ${{ github.event.inputs.enable_debug }}"
          echo ""
          echo "  Simulating build steps..."
          sleep 1 && echo "  [1/4] Dependencies installed ✅"
          sleep 1 && echo "  [2/4] Compiled source ✅"
          sleep 1 && echo "  [3/4] Assets bundled ✅"
          sleep 1 && echo "  [4/4] Docker image built ✅"


  # ══════════════════════════════════════════════════════════════
  # STAGE 5 — Summary Report
  # ══════════════════════════════════════════════════════════════
  stage-5-summary:
    name: "📊 Stage 5 · Summary Report"
    runs-on: ubuntu-latest
    needs: stage-4-build
    if: always()

    steps:
      - name: "📊 Write Job Summary"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🧪 Workflow Inputs Demo — Run Summary

          ## 📥 Inputs Received

          | Input Name       | Type        | Value |
          |------------------|-------------|-------|
          | `app_name`       | string      | ${{ github.event.inputs.app_name }} |
          | `version_tag`    | string      | ${{ github.event.inputs.version_tag || '(auto-generated)' }} |
          | `replica_count`  | number      | ${{ github.event.inputs.replica_count }} |
          | `enable_debug`   | boolean     | ${{ github.event.inputs.enable_debug }} |
          | `run_tests`      | boolean     | ${{ github.event.inputs.run_tests }} |
          | `environment`    | choice      | ${{ github.event.inputs.environment }} |
          | `log_level`      | choice      | ${{ github.event.inputs.log_level }} |
          | `cloud_provider` | choice      | ${{ github.event.inputs.cloud_provider }} |
          | `deploy_env`     | environment | ${{ github.event.inputs.deploy_env || 'N/A' }} |

          ## ✅ Stages Completed
          1. **Validate & Echo Inputs** — All inputs printed and validated
          2. **Conditional Steps** — Boolean inputs drove step execution
          3. **Environment Branching** — Choice inputs routed logic
          4. **Build** — Artefact built with resolved config
          5. **Summary** — This report

          > Triggered by: `@${{ github.actor }}` on `${{ github.ref_name }}`
          EOF

      - name: "🎉 Final Echo"
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║   ✅  ALL 5 STAGES COMPLETED SUCCESSFULLY    ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "  Workflow : ${{ github.workflow }}"
          echo "  Run #    : ${{ github.run_number }}"
          echo "  Actor    : ${{ github.actor }}"
          echo "  Ref      : ${{ github.ref_name }}"
